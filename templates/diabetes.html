<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dia.css') }}">
</head>

<body>
    <div class="dashboard-btn">
    <a href="/">
        ← Dashboard
    </a>
</div>

<div class="container">

    <div class="title-box">
        <h1>Diabetes Prediction</h1>
        <p>Predict whether a patient have diabetes or not</p>
    </div>

    <form action="/diabetes" method="post">

        <div class="input-group">
            <label for="n1">No.of Pregnancies:</label>
            <input type="text" name="n1" placeholder="Enter no.of Pregnancies">
        </div>

        <div class="input-group">
            <label for="n2">Glucose:</label>
            <input type="text" name="n2" placeholder="Enter Glucose">
        </div>

        <div class="input-group">
            <label for="n3">BloodPressure:</label>
            <input type="text" name="n3" placeholder="Enter BloodPressure">
        </div>

        <div class="input-group">
            <label for="n4">SkinThickness:</label>
            <input type="text" name="n4" placeholder="Enter SkinThickness">
        </div>

        <div class="input-group">
            <label for="n5">Insulin:</label>
            <input type="text" name="n5" placeholder="Enter Insulin">
        </div>

        <div class="input-group">
            <label for="n6">BMI:</label>
            <input type="text" name="n6" placeholder="Enter BMI">
        </div>

        <div class="input-group">
            <label for="n7">DiabetesPedigreeFunction:</label>
            <input type="text" name="n7" placeholder="Enter DiabetesPedigreeFunction">
        </div>

        <div class="input-group">
            <label for="n8">Age:</label>
            <input type="text" name="n8" placeholder="Enter Age">
        </div>

        <div class="btn-box">
            <button type="submit" name="submit">
                Predict
            </button>
        </div>

    </form>
       {% if prediction_text %}
    <div class="result {% if 'Outcome' in prediction_text %}Outcome{% else %}not-Outcome{% endif %}">
        <h2>{{ prediction_text }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
